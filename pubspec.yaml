name: gestanea
description: A comprehensive pregnancy and baby care mobile app.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  font_awesome_flutter: ^10.6.0
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.2
  url_launcher: ^6.2.5
  permission_handler: ^11.0.1

  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  file_picker: ^8.1.2
  http: ^1.6.0
  connectivity_plus: ^5.0.0

  # Image & OCR packages
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.13.0
  google_generative_ai: ^0.4.7
  shimmer: ^3.0.0
  path_provider: ^2.1.2
  archive: ^3.4.10
  share_plus: ^7.2.2
  cached_network_image: ^3.3.1
  printing: ^5.11.0
  pdf: ^3.10.4

  # Map dependencies
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  shared_preferences: ^2.5.3
  fl_chart: ^0.69.0
  flutter_svg: ^2.2.2
  animated_notch_bottom_bar: ^1.0.3
  crypto: ^3.0.7
  firebase_core: ^4.3.0
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.1.0

  android_alarm_manager_plus: ^5.0.0
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  bloc_test: ^10.0.0
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter

  flutter_launcher_icons: "^0.14.4"
  
flutter_icons:
  android: true
  ios: true
  image_path : "assets/images/gestanea.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/images/kickcounter.png
    - assets/images/fetus.png
  generate: true
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Italic.ttf
          style: italic
        - asset: assets/fonts/Lato-BoldItalic.ttf
          weight: 700
          style: italic
