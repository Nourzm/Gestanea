name: pregnancy_baby_app
description: A comprehensive pregnancy and baby care mobile app.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.5.3

  # API & Networking
  dio: ^5.3.0

  # UI/UX
  google_fonts: ^6.1.0
  lottie: ^2.4.0
  table_calendar: ^3.0.0
  fl_chart: ^0.64.0

  # Utilities
  uuid: ^4.0.0

  # Device Features
  geolocator: ^9.0.0
  image_picker: ^1.0.0

  # Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

  # Testing
  mocktail: ^1.0.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/onboarding1.png
    - assets/images/onboarding2.png
    - assets/images/onboarding3.png
    - assets/images/fetus-inside-heart-shape-womb.png

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato/Lato-Regular.ttf
        - asset: assets/fonts/Lato/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato/Lato-Black.ttf
          weight: 900
        - asset: assets/fonts/Lato/Lato-Light.ttf
          weight: 300
        - asset: assets/fonts/Lato/Lato-Italic.ttf
          style: italic