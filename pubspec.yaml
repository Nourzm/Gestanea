name: gestanea
description: A comprehensive pregnancy and baby care mobile app.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  animated_notch_bottom_bar: ^1.0.3
  flutter:
    sdk: flutter
    # Localization
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.1
  intl: ^0.20.2

  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/images/onboarding1.png
    - assets/images/onboarding2.png
    - assets/images/onboarding3.png
    - assets/images/fetus-inside-heart-shape-womb.png
