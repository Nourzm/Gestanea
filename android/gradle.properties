org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false
android.useAndroidX=true
android.enableJetifier=true

# Windows + JDK 21: if the build dies with
#   "java.io.IOException: Unable to establish loopback connection"
# the JDK is failing to create its AF_UNIX selector socket inside a TEMP
# path containing 8.3 short names (e.g. C:\Users\HIGHTE~1\...). This hits
# the Gradle *client* JVM, so it can't be fixed from this file — point
# Java at a short plain temp dir in the shell you build from:
#   TMP=D:\tmp  TEMP=D:\tmp  JAVA_TOOL_OPTIONS=-Djava.io.tmpdir=D:\tmp
# (also ensure C:\Windows\System32\drivers\etc\hosts maps localhost).
